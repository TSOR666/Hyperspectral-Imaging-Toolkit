defaults:
  - config
  - _self_

# Combined high-impact ablation. Start from random initialization.
# Pure MRAE with a denominator floor; no L1 term.
objective: mrae_stable
mrae_epsilon: 1.0e-3
decoder1_compress_first: true
stage_depths: [2, 2, 2, 2, 2]
allow_objective_mismatch_resume: false

log_dir: ${oc.env:HSI_LOG_DIR,./artifacts/logs}/ablation_stable_lite
checkpoint_dir: ${oc.env:HSI_CKPT_DIR,./artifacts/checkpoints}/ablation_stable_lite
