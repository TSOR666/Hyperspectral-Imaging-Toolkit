# src/configs/config.yaml

# Base training configuration shared by both training scripts.

seed: 42

dataset_source: mst  # mst | huggingface
data_dir: ${oc.env:HSI_DATA_DIR,./data/ARAD_1K}
log_dir: ${oc.env:HSI_LOG_DIR,./artifacts/logs}
checkpoint_dir: ${oc.env:HSI_CKPT_DIR,./artifacts/checkpoints}

# Hugging Face ARAD HSDB imagefolder adapter.  The public dataset is exposed as
# one train split with class labels such as NTIRE2020_Train_Clean and
# NTIRE2020_Train_RealWorld.  Override hf_rgb_label/hf_hsi_label if your local
# cache uses different names for RGB inputs and spectral targets.
hf_dataset_name: mhmdjouni/arad_hsdb
hf_split: train
hf_train_label_filter: train
hf_val_label_filter: validation,val
hf_rgb_label: null
hf_hsi_label: null
hf_patches_per_image: 1
hf_max_train_samples: null
hf_max_val_samples: null
hf_allow_pseudo_hsi: false

batch_size: 32   # paper batch size (HSIFormer Sec 4.2)
val_batch_size: 1
patch_size: 128
stride: 8
# MST++ trains for 300 epochs with 1000 updates per epoch. Keep the full 300k
# cosine horizon for the benchmark-aligned MRAE run; an evaluation at 28k steps
# is only about 9% through training and should not be treated as converged.
epochs: 300
iterations_per_epoch: 1000
gradient_accumulation_steps: 2
num_workers: 8   # was 2; raise toward (CPU cores - 2) to speed up patch loading
# Validation rebuilds its DataLoader every epoch; with persistent_workers off,
# a high worker count re-spawns processes (and re-pickles resident scenes under
# spawn) each time for a tiny val set. null -> min(num_workers, 2).
val_num_workers: null
n_critic: 1
mixed_precision: true
mixed_precision_dtype: auto
deterministic: false
allow_tf32: true
memory_mode: standard
lazy_cache_size: 3  # per-worker RGB scene + open-HDF5 handle LRU when memory_mode=lazy
strict_dataset_files: true  # fail instead of silently dropping missing/corrupt split scenes
excluded_scene_stems: [ARAD_1K_0314]  # known-corrupt ARAD-1K scene
validation_max_batches: null
finite_check_interval: 100
max_consecutive_ooms: 3
# Score checkpoints in the same physical reflectance domain used by
# cswin_test_ntire.py and prediction export. Keep raw MRAE as a diagnostic so
# output-range drift remains visible without selecting a worse deployed model.
validation_clamp_output: true
validation_report_raw_mrae: true
# Match checkpoint selection to cswin_test_ntire.py. This is semantically
# important for CSWIN: a 128x128 tile uses global bottleneck attention while a
# full ARAD frame crosses the token threshold and uses local attention instead.
validation_tiled_inference: true
validation_patch_size: 128
validation_patch_overlap: 16
validation_patch_batch_size: 4

# Stop a single-resolution run after validation MRAE has genuinely plateaued.
# For progressive training this is applied only to the final patch-size stage,
# so an intermediate stage cannot prevent the higher-resolution fine-tuning.
early_stopping_patience: 0  # disabled for the full benchmark-aligned 300k run
early_stopping_min_delta: 1.0e-4
early_stopping_warmup_epochs: 10
early_stopping_final_stage_only: true

# ===========================================================================
# ACTIVE DIRECTION: generator-only HSIFormer/SST training (train_generator.py)
# Architecture aligned to HSIFormer with an annealed MRAE-only objective:
# an efficient SSTB generator (CBAM channel gate ->
# S-MSA + GDFN -> CSwin + SGFN), Adam lr 4e-4 cosine. The sinkhorn_* /
# lambda_* / discriminator_* / r1 / n_critic / gradient_accumulation_steps keys
# below are LEGACY (read only by the deprecated GAN trainers).
# ===========================================================================
# Start a fresh run. ``mrae_annealed`` is still pure MRAE: it starts with a
# stabilized denominator floor so near-zero reflectance pixels do not dominate
# early optimization, then decays to exact MST++/leaderboard MRAE.
objective: mrae_annealed
allow_objective_mismatch_resume: false
optimizer: adam          # matches MST++ training
weight_decay: 0.0
mrae_epsilon: 1.0e-3      # compatibility alias for the initial floor
mrae_epsilon_start: 1.0e-3
mrae_epsilon_end: 1.0e-8
mrae_epsilon_anneal_iters: 50000

# Generator architecture (HSIFormer SSTB, right-sized for ARAD's ~900 scenes):
base_channels: 48                # was 96 (44.8M -> overfit); ~paper-scale efficient model
num_heads: 4
stage_depths: [2, 2, 2, 2, 4]    # [enc1, enc2, bottleneck, dec1, dec2] (paper: deeper final stage)
split_sizes: [7, 7, 7]
# Opt-in ablation: compress the first decoder skip from 4x to 2x base width
# before its transformer blocks. False preserves existing checkpoints.
decoder1_compress_first: false
spectral_attention_type: s_msa   # full-res-token channel self-attn (the ablation workhorse)
# auto keeps FP16 attention in FP32, but lets BF16 use Tensor Cores.
spectral_attention_force_fp32: auto
# Trainer-level finite checks remain enabled every 100 steps; disabling the
# per-block scans removes dozens of GPU synchronization points per iteration.
spectral_attention_sanitize_nonfinite: false
# Scalable spatial attention: local 7x7 windows at high resolution, with a
# second offset grid for cross-window mixing; switch to true global attention
# only when a feature map has at most 1024 tokens. This replaces the legacy
# row/column axial path whose cost remained quadratic along the full image axis.
cswin_attention_mode: local_global
cswin_global_tokens: 1024
sampling: pixelshuffle           # learned PixelUnshuffle/PixelShuffle (paper uses pixel shuffle)
use_noise_block: false           # NoiseAwareBlock is not in the paper
thick_output_head: false         # paper ToOut is a single conv
ffn_expansion: 2.66              # GDFN/SGFN hidden-channel expansion

# Progressive training: fine-tune at growing patch sizes 128 -> 256 -> 512.
# UNCOMMENT for a final multi-resolution run; leave commented
# for single-resolution ablations (then training uses patch_size + epochs *
# iterations_per_epoch above). Reduce batch_size at larger patches to fit
# memory. The first stage keeps the benchmark-aligned 300k cosine horizon.
# progressive_stages:
#   - {patch_size: 128, iterations: 300000, init_lr: 4.0e-4, batch_size: 32}
#   - {patch_size: 256, iterations: 50000,  init_lr: 4.0e-5, batch_size: 8}
#   - {patch_size: 512, iterations: 50000,  init_lr: 4.0e-5, batch_size: 2}

warmup_steps: 1000
# MST++ init_lr is 4e-4 (was 1e-4 for the GAN generator). Cosine-annealed over
# epochs * iterations_per_epoch with linear warmup.
generator_lr: 0.0004
# --- legacy GAN trainer keys below (ignored by train_generator.py) ---
discriminator_lr: 0.00002
sinkhorn_epsilon: 0.1
sinkhorn_iters: 25   # was 50; halves Sinkhorn cost (adversarial weight is small)
sinkhorn_flatten_spatial: true
sinkhorn_max_points: 512   # was 1024; ~4x cheaper OT cost matrix per batch element
sinkhorn_kernel_clamp: 60.0
sinkhorn_force_fp32: true
sinkhorn_loss_clip: 5.0
use_r1_regularization: true
r1_gamma: 10.0

# Generator weight EMA: validate and save best_model.pth from an exponential
# moving average of the generator weights instead of the raw training iterate.
# Smooths the late-epoch metric noise typical of GAN training and makes the
# final weights match best-epoch quality. best_model.pth stores the EMA
# weights; latest_checkpoint.pth keeps the raw weights for exact resume.
use_ema: true
ema_decay: 0.999
ema_update_every: 10

# Legacy GAN-only loss keys below are ignored by train_generator.py.
use_adaptive_weights: false
reconstruction_loss: l1   # legacy GAN-only key
lambda_rec: 1.0
lambda_mrae: 0.1          # was 0.2; small so MRAE stays directly optimized
relative_mrae_epsilon: 0.01
lambda_perceptual: 0.0
use_sinkhorn_adversarial: true   # keep optimal-transport adversarial loss
lambda_adversarial: 0.01
lambda_sam: 0.0           # legacy GAN-only key

# Linear output head (no activation). 'none' keeps a training-time soft-clamp (+/-clamp_range) for
# stability; the eval output is unbounded reflectance. NOTE: changing the
# output head requires a FRESH run.
output_activation: none
activation_delay_iters: 0

checkpoint_keep: 5

hydra:
  run:
    dir: ${log_dir}/hydra/${now:%Y%m%d_%H%M%S}
  output_subdir: null
