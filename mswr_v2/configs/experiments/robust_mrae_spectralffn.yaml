# ============================================================================
# MSWR-Net v2.1.2  -  Rung-1: full-rank spectral + spectral gated-FFN
# experiment_name: mswr_v212_robust_mrae_spectralffn
# ============================================================================
#
# Builds on the CONFIRMED Rung-0 win (2026-06-20): spectral_attn_heads: 1
# (full-rank C x C band-to-band attention) cut val MRAE 0.250 -> 0.229 for zero
# added params. This config is byte-identical to robust_mrae_fullrank.yaml
# (the new baseline) plus ONE additive lever:
#
#     spectral_ffn: true          # + spectral_ffn_mult: 2
#
# WHAT IT TESTS
#   The spectral S-MSA branch now has full-rank ATTENTION but still no
#   feed-forward stage (MST++'s MSAB pairs S-MSA with a gated FFN). This adds a
#   zero-init-gated GDFN spectral FFN residual to every block -- the
#   NON-redundant addition now that attention is full-rank (an FFN-free second
#   attention would merely duplicate SpectralMSA2D). ~+0.44M params (+~14% on
#   3.04M) at mult=2. Exact identity at init, checkpoint-safe.
#
#   Run from scratch, same seed, MRAE-only, against robust_mrae_fullrank.yaml
#   (the spectral_ffn: false baseline). The only variable is the spectral FFN,
#   so any val-MRAE delta is attributable to it. Decision rule: ship if it beats
#   the fullrank baseline by >=0.01 MRAE without a worse train/val overfit gap;
#   if the gap widens instead, the model is overfit-limited not capacity-limited
#   -- back off (mult stays 2 or drop) and pursue regularization / multistage.
# ============================================================================

experiment_name: mswr_v212_robust_mrae_spectralffn
model_size: base
gpu_id: "0"

# ---- data / iteration ----
batch_size: 20
patch_size: 128
stride: 8
end_epoch: 220
steps_per_epoch: 1000
num_workers: 4
pin_memory: true
save_frequency: 5000
validate_frequency: 1000
mrae_diagnostics: true
seed: 42

# ---- architecture (fullrank baseline + the Rung-1 spectral-FFN lever) ----
attention_type: dual
use_flash_attn: true
use_spectral_attn: true
spectral_attn_heads: 1                # Rung-0 win: full-rank C x C band-to-band attention
spectral_ffn: true                    # <<< THE ONLY DIFF vs robust_mrae_fullrank.yaml
spectral_ffn_mult: 2                  # hidden expansion (2 ~ +0.44M); raise to 4 only if capacity-starved
landmark_pooling: learned
use_wavelet: true
wavelet_type: db2
wavelet_levels: [1, 1, 1]
wavelet_detail_processing: true

# ---- host-RAM dataset cache ----
cache_dtype: float32

# ---- LOSS: MRAE ONLY (MST++/ARAD-1K comparable) ----
use_enhanced_loss: false

# ---- optimizer / schedule ----
optimizer: adamw
scheduler: cosine
init_lr: 4.0e-4
min_lr: 1.0e-6
warmup_epochs: 5
weight_decay: 1.0e-2
gradient_clip: 1.0
gradient_accumulation_steps: 1

# ---- REGULARIZATION ----
drop_path: 0.15
attention_dropout: 0.02

# ---- precision / memory ----
use_amp: true
amp_dtype: auto
channels_last: true
memory_monitoring: true

# ---- EMA + honest selection ----
use_ema: true
ema_decay: 0.999
ema_start_epoch: 5
ema_eval_mode: both
selection_source: auto

# ---- early stopping: OFF ----
early_stopping_mode: "off"
