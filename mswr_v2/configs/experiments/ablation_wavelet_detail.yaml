# Ablation: process high-frequency wavelet detail bands.
#
# Addresses audit ROUND5 open item: the wavelet branch applies attention/FFN
# only to the low-frequency (LL) subband, while the LH/HL/HH detail bands are
# merely multiplicatively gated. With wavelet_levels=[1,1,1] every encoder stage
# attends at half resolution, so high-frequency structure is under-modeled.
#
# wavelet_detail_processing: true adds a lightweight per-channel depthwise
# residual on the detail bands (zero-init -> exact identity at start, so this is
# checkpoint-safe and does not destabilize from-scratch training). Otherwise
# IDENTICAL to configs/train.yaml. Still MRAE-only -> MST++-comparable.
#
# Run head-to-head against train.yaml under the same seed/schedule.

experiment_name: mswr_v212_ablation_wavelet_detail
model_size: base
gpu_id: "0"

# Data / iteration
batch_size: 20
patch_size: 128
stride: 8
end_epoch: 220
steps_per_epoch: 1000
num_workers: 4
pin_memory: true
save_frequency: 5000
validate_frequency: 1000
mrae_diagnostics: true
seed: 42

# Architecture — only wavelet_detail_processing differs from train.yaml
attention_type: dual
use_flash_attn: true
use_spectral_attn: true
use_wavelet: true
wavelet_type: db2
wavelet_levels: [1, 1, 1]
wavelet_detail_processing: true   # <-- the ablation knob (default is false)

# MRAE-only benchmark objective (keeps the metric MST++-comparable)
use_enhanced_loss: false

# Optimizer / schedule
optimizer: adamw
scheduler: cosine
init_lr: 4.0e-4
min_lr: 1.0e-6
warmup_epochs: 5
weight_decay: 1.0e-2
gradient_clip: 1.0
gradient_accumulation_steps: 1

# Precision / memory
use_amp: true
amp_dtype: auto
channels_last: true
memory_monitoring: true

# EMA
use_ema: true
ema_decay: 0.999
ema_start_epoch: 5
ema_eval_mode: both
selection_source: auto

early_stopping_mode: "off"
