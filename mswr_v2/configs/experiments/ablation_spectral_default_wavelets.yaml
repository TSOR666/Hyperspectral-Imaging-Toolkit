# Historical experiment: spectral attention with default wavelet depths.
#
# This is not the recommended training config. Use ../train.yaml for new runs.
#
# Builds on the regularized spatial ablation and
# adds the one thing the architecture was missing: MST++-style spectral
# (band-to-band) self-attention. Run A confirmed MSWR plateaus at ~0.256 EMA
# MRAE — an architecture ceiling, not overfitting: the original attention is
# entirely SPATIAL (window + Nystrom landmark + SE channel gating) with no
# band-to-band attention, which is MST++'s defining inductive bias for RGB->HSI
# and the likely cause of the ~0.10 gap to MST++ (0.16) despite MSWR being
# larger (2.6M vs ~1.6M params).
#
# use_spectral_attn: true adds a SpectralMSA2D branch inside every dual-attention
# block (q/k/v 1x1 convs, per-head C/heads x C/heads channel attention, depthwise
# positional embedding on V). Adds ~0.4M params (-> ~3.0M total). Loss stays
# MRAE-only, so the metric remains MST++-comparable.
#
# end_epoch lowered 200 -> 150: Run A peaked at ep102 and overfit the back half,
# so its cosine anneal landed far past the peak. 150 puts the low-LR anneal
# nearer the expected convergence point; EMA still captures the best checkpoint,
# so a slightly-early cutoff is safe. Tune up if it is still improving at ep150.
#
# Train from scratch — do NOT pass --pretrained_model_path.

# ---- run / paths ----
experiment_name: mswr_v212_runC_spectral
model_size: base
gpu_id: "0"

# ---- data / iteration ----
batch_size: 20
patch_size: 128
stride: 8
end_epoch: 150               # was 200 in Run A — match anneal to the convergence point
steps_per_epoch: 1000
num_workers: 4
pin_memory: true
save_frequency: 5000
validate_frequency: 1000
mrae_diagnostics: true
seed: 42

# ---- architecture (preset + spectral attention) ----
attention_type: dual
use_flash_attn: true
use_spectral_attn: true      # NEW: MST++-style band-to-band spectral self-attention

# ---- wavelets (kept on) ----
use_wavelet: true
wavelet_type: db2

# ---- LOSS: MRAE only (unchanged — keeps the metric MST++-comparable) ----
use_enhanced_loss: false

# ---- optimizer / schedule (Run A) ----
optimizer: adamw
scheduler: cosine
init_lr: 4.0e-4
min_lr: 1.0e-6
warmup_epochs: 5
weight_decay: 1.0e-2
gradient_clip: 1.0
gradient_accumulation_steps: 1

# ---- precision / mem ----
use_amp: true
amp_dtype: auto
channels_last: true
memory_monitoring: true

# ---- EMA: ON (Run A) ----
use_ema: true
ema_decay: 0.999
ema_start_epoch: 5
ema_eval_mode: both

# ---- early stopping: OFF ----
early_stopping_mode: "off"
