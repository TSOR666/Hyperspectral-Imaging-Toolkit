# MSWR-Net v2.1.2 — MRAE-focused warm-restart fine-tune
#
# Context: prior 300-epoch cosine run plateaued at val MRAE ≈ 0.274 and showed
# clear overfitting (train loss falling, val MRAE flat/rising) over the last
# ~35 epochs. The cosine schedule was at min_lr for most of that window, so
# the model had no room to escape the local minimum.
#
# This config does a short, MRAE-aligned warm restart from the best checkpoint:
#   - Strip optimizer/scheduler/EMA state first (see scripts/strip_checkpoint.py)
#     so resume_path loads model weights only and the schedule starts fresh.
#   - Re-weight the loss toward MRAE (the actual evaluation metric).
#   - Lower init_lr with a fresh short cosine cycle.
#   - Stronger weight decay + early stopping to catch overfitting.
#   - Report model weights (not EMA) for "best" tracking, since the prior best
#     checkpoint source was 'model' even with EMA running.

# ---- run / paths (override on the CLI for your HPC paths) ----
experiment_name: mswr_v212_ft_mrae
model_size: base
gpu_id: "0"
# Point this at the stripped weights file produced by scripts/strip_checkpoint.py
pretrained_model_path: ./experiments/checkpoints/best_model_weights_only.pth

# ---- data / iteration ----
batch_size: 20
patch_size: 128
stride: 8
end_epoch: 60                # short fine-tune horizon
steps_per_epoch: 2000        # 2x previous; stronger signal per epoch
num_workers: 4
pin_memory: true
save_frequency: 4000
validate_frequency: 1000
seed: 42

# ---- architecture (preset owns the rest) ----
attention_type: dual
use_flash_attn: true

# ---- wavelets ----
use_wavelet: true
wavelet_type: db2

# ---- loss: re-aligned to the evaluation metric ----
use_enhanced_loss: true
l1_weight: 1.0
mrae_weight: 0.5             # was 0.05 — primary leverage change
ssim_weight: 0.25            # halved to make MRAE/L1 dominant
sam_weight: 0.1
gradient_weight: 0.05        # halved; was crowding the gradient
loss_warmup_epochs: 3        # short warmup for fine-tune

# ---- optimizer / schedule (warm restart) ----
optimizer: adamw
scheduler: cosine
init_lr: 3.0e-5              # was 1.0e-4; we're already near a minimum
min_lr: 1.0e-7
warmup_epochs: 2
weight_decay: 5.0e-4         # was 1.0e-4; stronger regularization
gradient_clip: 1.0
gradient_accumulation_steps: 1

# ---- precision / mem ----
use_amp: true
amp_dtype: auto
channels_last: true
memory_monitoring: true

# ---- EMA ----
use_ema: true
ema_decay: 0.9995            # slightly slower; was 0.999
ema_start_epoch: 0
ema_eval_mode: model         # was 'both' (logged ema only); track model now

# ---- early stopping: ON so we don't waste a run ----
early_stopping_mode: min
early_stopping_patience: 15
early_stopping_warmup: 5
